<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Med Arb International | Header Component</title>
  <style>
    /* All header styles are scoped with .medarb-header class to prevent conflicts */
    .medarb-header {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    /* Navigation Styles - All prefixed with medarb- */
    .medarb-nav-container {
      background: white;
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
    }
    
    .medarb-nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .medarb-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }
    
    .medarb-logo-icon {
      font-size: 1.8rem;
      color: #0A2540;
    }
    
    .medarb-logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: #0A2540;
    }
    
    .medarb-logo-text span {
      color: #C9A227;
    }
    
    /* Desktop Navigation */
    .medarb-nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .medarb-nav-links a {
      text-decoration: none;
      color: #4a5568;
      font-weight: 500;
      transition: all 0.2s ease;
      font-size: 0.95rem;
      padding: 0.5rem 0;
    }
    
    .medarb-nav-links a:hover {
      color: #C9A227;
    }
    
    /* Contact Button */
    .medarb-contact-btn {
      background: #0A2540;
      color: white !important;
      padding: 0.6rem 1.5rem !important;
      border-radius: 50px;
      transition: all 0.2s ease !important;
      font-size: 0.95rem !important;
      font-weight: 600 !important;
    }
    
    .medarb-contact-btn:hover {
      background: #C9A227;
      color: #0A2540 !important;
      transform: translateY(-2px);
    }
    
    /* Mobile Menu Button */
    .medarb-mobile-btn {
      display: none;
      background: #0A2540;
      border: none;
      font-size: 1.5rem;
      color: white;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: all 0.2s;
    }
    
    .medarb-mobile-btn:hover {
      background: #C9A227;
      color: #0A2540;
    }
    
    /* Mobile Menu - Hidden by default */
    .medarb-mobile-menu {
      display: none;
      background: white;
      border-top: 1px solid #e2e8f0;
      padding: 1rem 1.5rem;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
    }
    
    .medarb-mobile-menu.active {
      display: flex;
    }
    
    .medarb-mobile-menu a {
      text-decoration: none;
      color: #4a5568;
      font-weight: 500;
      padding: 0.7rem 0;
      font-size: 1rem;
      border-bottom: 1px solid #f0f0f0;
      transition: all 0.2s;
    }
    
    .medarb-mobile-menu a:last-child {
      border-bottom: none;
    }
    
    .medarb-mobile-menu a:hover {
      color: #C9A227;
      padding-left: 0.5rem;
      background: #f8fafc;
    }
    
    .medarb-mobile-contact {
      background: #0A2540;
      color: white !important;
      text-align: center;
      padding: 0.8rem !important;
      border-radius: 50px;
      font-weight: 600 !important;
    }
    
    .medarb-mobile-contact:hover {
      background: #C9A227;
      color: #0A2540 !important;
    }
    
    /* Responsive Breakpoints */
    @media (max-width: 1024px) {
      .medarb-nav-links { gap: 1rem; }
      .medarb-nav-links a { font-size: 0.85rem; }
      .medarb-logo-text { font-size: 1.2rem; }
      .medarb-logo-icon { font-size: 1.5rem; }
      .medarb-contact-btn { padding: 0.5rem 1.2rem !important; font-size: 0.85rem !important; }
    }
    
    @media (max-width: 900px) {
      .medarb-nav-links { display: none; }
      .medarb-mobile-btn { display: block; }
      .medarb-nav-inner { padding: 0.8rem 1.2rem; }
      .medarb-logo-text { font-size: 1.1rem; }
    }
    
    @media (max-width: 480px) {
      .medarb-nav-inner { padding: 0.7rem 1rem; }
      .medarb-mobile-btn { font-size: 1.3rem; padding: 0.4rem 0.8rem; }
      .medarb-logo-text { font-size: 1rem; }
      .medarb-logo-icon { font-size: 1.3rem; }
      .medarb-mobile-menu { padding: 0.8rem 1rem; }
      .medarb-mobile-menu a { font-size: 0.9rem; padding: 0.6rem 0; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="medarb-header">
  <div class="medarb-nav-container">
    <div class="medarb-nav-inner">
      <a href="index.html" class="medarb-logo">
        <i class="fas fa-gavel medarb-logo-icon"></i>
        <span class="medarb-logo-text">Med Arb <span>International</span></span>
      </a>
      
      <div class="medarb-nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="practice-areas.html">Practice Areas</a>
        <a href="med-arb-process.html">Med-Arb Process</a>
        <a href="experience.html">Experience</a>
        <a href="legal-awareness.html">Legal Awareness</a>
        <a href="articles.html">Articles</a>
        <a href="contact.html" class="medarb-contact-btn">Contact</a>
      </div>
      
      <button class="medarb-mobile-btn" id="medarbMobileBtn">
        <i class="fas fa-bars"></i>
      </button>
    </div>
    
    <div class="medarb-mobile-menu" id="medarbMobileMenu">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="practice-areas.html">Practice Areas</a>
      <a href="med-arb-process.html">Med-Arb Process</a>
      <a href="experience.html">Experience</a>
      <a href="legal-awareness.html">Legal Awareness</a>
      <a href="articles.html">Articles</a>
      <a href="contact.html" class="medarb-mobile-contact">Contact</a>
    </div>
  </div>
</div>

<script>
  // ============================================
  // HEADER JAVASCRIPT - SELF CONTAINED
  // Does NOT affect any other page elements
  // ============================================
  (function() {
    'use strict';
    
    // Wait for DOM to be ready
    function initHeader() {
      // Get mobile menu elements
      const mobileBtn = document.getElementById('medarbMobileBtn');
      const mobileMenu = document.getElementById('medarbMobileMenu');
      
      // If elements don't exist, exit silently
      if (!mobileBtn || !mobileMenu) {
        console.warn('MedArb Header: Mobile menu elements not found');
        return;
      }
      
      // Toggle menu function
      function toggleMobileMenu(event) {
        // Prevent event from affecting page
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }
        
        // Toggle the active class
        if (mobileMenu.classList.contains('active')) {
          mobileMenu.classList.remove('active');
        } else {
          mobileMenu.classList.add('active');
        }
      }
      
      // Remove any existing listeners by cloning (clean approach)
      const newBtn = mobileBtn.cloneNode(true);
      mobileBtn.parentNode.replaceChild(newBtn, mobileBtn);
      const finalMobileBtn = document.getElementById('medarbMobileBtn');
      const finalMobileMenu = document.getElementById('medarbMobileMenu');
      
      // Add click event to hamburger button
      if (finalMobileBtn) {
        finalMobileBtn.addEventListener('click', toggleMobileMenu);
      }
      
      // Close menu when clicking on any link inside mobile menu
      if (finalMobileMenu) {
        const mobileLinks = finalMobileMenu.querySelectorAll('a');
        mobileLinks.forEach(function(link) {
          link.addEventListener('click', function() {
            finalMobileMenu.classList.remove('active');
          });
        });
        
        // Prevent menu clicks from bubbling up
        finalMobileMenu.addEventListener('click', function(e) {
          e.stopPropagation();
        });
      }
      
      // Close menu when clicking outside (optional but good UX)
      document.addEventListener('click', function(event) {
        if (finalMobileMenu && finalMobileMenu.classList.contains('active')) {
          const isClickInside = finalMobileMenu.contains(event.target) || 
                                (finalMobileBtn && finalMobileBtn.contains(event.target));
          if (!isClickInside) {
            finalMobileMenu.classList.remove('active');
          }
        }
      });
      
      // Close menu on window resize (when switching to desktop)
      window.addEventListener('resize', function() {
        if (finalMobileMenu && window.innerWidth > 900) {
          finalMobileMenu.classList.remove('active');
        }
      });
    }
    
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initHeader);
    } else {
      initHeader();
    }
  })();
</script>

</body>
</html>
